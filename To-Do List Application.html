<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
      color: #1e1e2e;
    }

    /* ── Container ── */
    .container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(80, 90, 200, 0.12);
      width: 100%;
      max-width: 560px;
      padding: 2.5rem 2rem 2rem;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2rem; }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: -0.5px;
    }

    header p { font-size: 0.9rem; color: #6b7280; margin-top: 4px; }

    /* ── Stats Bar ── */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      flex: 1;
      background: #f5f3ff;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
    }

    .stat-card span:first-child {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: #4f46e5;
    }

    .stat-card span:last-child {
      font-size: 0.72rem;
      color: #7c6edb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Input Area ── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.8rem;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      outline: none;
      color: #1e1e2e;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      background: #fff;
    }

    .input-row input::placeholder { color: #9ca3af; }

    .btn-add {
      padding: 12px 20px;
      font-size: 1.3rem;
      font-weight: 700;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      line-height: 1;
    }

    .btn-add:hover { background: #4338ca; box-shadow: 0 4px 14px rgba(79,70,229,0.3); }
    .btn-add:active { transform: scale(0.96); }

    /* ── Filter Tabs ── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1.2rem;
    }

    .filter-btn {
      flex: 1;
      padding: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      border: 2px solid #e5e7eb;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: #4f46e5; color: #4f46e5; }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    /* ── Task List ── */
    #task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #9ca3af;
      display: none;
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.95rem; }

    /* ── Task Item ── */
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fafafa;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 14px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s, opacity 0.3s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }

    .task-item:hover { border-color: #c7c3f4; box-shadow: 0 3px 12px rgba(79,70,229,0.08); }

    /* Checkbox (custom) */
    .task-check {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      font-size: 0.7rem;
      color: transparent;
    }

    .task-check:hover { border-color: #4f46e5; transform: scale(1.1); }

    .task-item.done .task-check {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1e1e2e;
      word-break: break-word;
      transition: color 0.2s;
      line-height: 1.4;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    /* Edit input */
    .task-edit-input {
      flex: 1;
      font-size: 0.95rem;
      padding: 4px 8px;
      border: 2px solid #4f46e5;
      border-radius: 8px;
      outline: none;
      color: #1e1e2e;
      background: #fff;
    }

    /* Actions */
    .task-actions { display: flex; gap: 6px; }

    .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-icon:active { transform: scale(0.9); }

    .btn-edit { background: #eef2ff; color: #4f46e5; }
    .btn-edit:hover { background: #e0e7ff; }

    .btn-save { background: #ecfdf5; color: #059669; }
    .btn-save:hover { background: #d1fae5; }

    .btn-delete { background: #fff1f2; color: #e11d48; }
    .btn-delete:hover { background: #ffe4e6; }

    /* ── Priority Badge ── */
    .priority {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }

    .p-high   { background: #fff1f2; color: #e11d48; }
    .p-medium { background: #fffbeb; color: #d97706; }
    .p-low    { background: #ecfdf5; color: #059669; }

    /* Priority selector */
    .priority-sel {
      font-size: 0.78rem;
      padding: 4px 8px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      background: #fafafa;
      color: #374151;
      outline: none;
    }

    /* ── Clear Completed ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1.5px solid #f3f4f6;
    }

    .footer span { font-size: 0.82rem; color: #9ca3af; }

    .btn-clear {
      font-size: 0.8rem;
      padding: 6px 14px;
      border: 1.5px solid #fecdd3;
      background: transparent;
      color: #e11d48;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-clear:hover { background: #fff1f2; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .container { padding: 1.75rem 1.2rem 1.5rem; }
      header h1 { font-size: 1.65rem; }
      .input-row { flex-direction: column; }
      .btn-add { width: 100%; padding: 12px; font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <h1>📝 My Tasks</h1>
    <p>Stay organised. Stay focused.</p>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <span id="stat-total">0</span>
      <span>Total</span>
    </div>
    <div class="stat-card">
      <span id="stat-active">0</span>
      <span>Active</span>
    </div>
    <div class="stat-card">
      <span id="stat-done">0</span>
      <span>Done</span>
    </div>
  </div>

  <!-- Input -->
  <div class="input-row">
    <input
      type="text"
      id="task-input"
      placeholder="What needs to be done?"
      maxlength="200"
      autocomplete="off"
    />
    <select class="priority-sel" id="priority-sel" title="Priority">
      <option value="medium">🟡 Med</option>
      <option value="high">🔴 High</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="btn-add" id="add-btn" title="Add task">+</button>
  </div>

  <!-- Filter Tabs -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state">
    <div class="icon">🎉</div>
    <p id="empty-msg">No tasks yet — add one above!</p>
  </div>

  <!-- Task List -->
  <ul id="task-list"></ul>

  <!-- Footer -->
  <div class="footer" id="footer" style="display:none;">
    <span id="footer-info"></span>
    <button class="btn-clear" id="clear-btn">Clear Done</button>
  </div>

</div>

<script>
  /* ───────────────────────────────────────────
     STATE
  ─────────────────────────────────────────── */
  let tasks = [];           // Array of task objects
  let currentFilter = 'all'; // 'all' | 'active' | 'done'

  /* ───────────────────────────────────────────
     DOM REFS
  ─────────────────────────────────────────── */
  const taskInput   = document.getElementById('task-input');
  const prioritySel = document.getElementById('priority-sel');
  const addBtn      = document.getElementById('add-btn');
  const taskList    = document.getElementById('task-list');
  const emptyState  = document.getElementById('empty-state');
  const emptyMsg    = document.getElementById('empty-msg');
  const footer      = document.getElementById('footer');
  const footerInfo  = document.getElementById('footer-info');
  const clearBtn    = document.getElementById('clear-btn');
  const filterBtns  = document.querySelectorAll('.filter-btn');
  const statTotal   = document.getElementById('stat-total');
  const statActive  = document.getElementById('stat-active');
  const statDone    = document.getElementById('stat-done');

  /* ───────────────────────────────────────────
     LOCAL STORAGE HELPERS
  ─────────────────────────────────────────── */
  function saveTasks() {
    localStorage.setItem('todo_tasks', JSON.stringify(tasks));
  }

  function loadTasks() {
    const stored = localStorage.getItem('todo_tasks');
    tasks = stored ? JSON.parse(stored) : [];
  }

  /* ───────────────────────────────────────────
     ADD TASK
  ─────────────────────────────────────────── */
  function addTask() {
    const text = taskInput.value.trim();
    if (!text) {
      taskInput.focus();
      taskInput.classList.add('shake');
      setTimeout(() => taskInput.classList.remove('shake'), 400);
      return;
    }

    const task = {
      id:       Date.now(),           // Unique ID based on timestamp
      text:     text,
      done:     false,
      priority: prioritySel.value,
      created:  new Date().toLocaleDateString()
    };

    tasks.unshift(task);  // Add to beginning of array
    saveTasks();
    taskInput.value = '';
    taskInput.focus();
    render();
  }

  /* ───────────────────────────────────────────
     TOGGLE DONE
  ─────────────────────────────────────────── */
  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.done = !task.done;
      saveTasks();
      render();
    }
  }

  /* ───────────────────────────────────────────
     DELETE TASK
  ─────────────────────────────────────────── */
  function deleteTask(id) {
    // Animate out before removing
    const item = document.querySelector(`[data-id="${id}"]`);
    if (item) {
      item.style.opacity = '0';
      item.style.transform = 'translateX(20px)';
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        render();
      }, 250);
    }
  }

  /* ───────────────────────────────────────────
     EDIT TASK
  ─────────────────────────────────────────── */
  function enableEdit(id) {
    const item = document.querySelector(`[data-id="${id}"]`);
    if (!item) return;

    const textEl   = item.querySelector('.task-text');
    const editBtn  = item.querySelector('.btn-edit');
    const task     = tasks.find(t => t.id === id);

    // Replace text span with input
    const input = document.createElement('input');
    input.className   = 'task-edit-input';
    input.value       = task.text;
    input.maxLength   = 200;
    textEl.replaceWith(input);
    input.focus();
    input.select();

    // Change edit button to save button
    editBtn.textContent = '✓';
    editBtn.className   = 'btn-icon btn-save';
    editBtn.title       = 'Save';
    editBtn.onclick     = () => saveEdit(id, input);

    // Save on Enter key
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  saveEdit(id, input);
      if (e.key === 'Escape') render(); // Cancel — re-render
    });
  }

  function saveEdit(id, input) {
    const newText = input.value.trim();
    if (!newText) return;
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.text = newText;
      saveTasks();
      render();
    }
  }

  /* ───────────────────────────────────────────
     FILTER
  ─────────────────────────────────────────── */
  function getFilteredTasks() {
    if (currentFilter === 'active') return tasks.filter(t => !t.done);
    if (currentFilter === 'done')   return tasks.filter(t =>  t.done);
    return tasks;
  }

  /* ───────────────────────────────────────────
     RENDER
  ─────────────────────────────────────────── */
  function render() {
    const filtered  = getFilteredTasks();
    const doneCount = tasks.filter(t => t.done).length;
    const activeCount = tasks.length - doneCount;

    // Update stats
    statTotal.textContent  = tasks.length;
    statActive.textContent = activeCount;
    statDone.textContent   = doneCount;

    // Empty state
    if (filtered.length === 0) {
      taskList.innerHTML = '';
      emptyState.style.display = 'block';
      emptyMsg.textContent =
        tasks.length === 0            ? 'No tasks yet — add one above!' :
        currentFilter === 'active'    ? 'No active tasks. All done! 🎉' :
                                        'No completed tasks yet.';
    } else {
      emptyState.style.display = 'none';
    }

    // Footer
    if (tasks.length > 0) {
      footer.style.display = 'flex';
      footerInfo.textContent = `${activeCount} task${activeCount !== 1 ? 's' : ''} remaining`;
      clearBtn.style.display = doneCount > 0 ? 'block' : 'none';
    } else {
      footer.style.display = 'none';
    }

    // Build list items
    taskList.innerHTML = '';
    filtered.forEach(task => {
      const li = document.createElement('li');
      li.className = `task-item${task.done ? ' done' : ''}`;
      li.dataset.id = task.id;

      // Priority badge label
      const pLabel = task.priority.charAt(0).toUpperCase() + task.priority.slice(1);
      const pClass = `priority p-${task.priority}`;

      li.innerHTML = `
        <div class="task-check" title="Toggle done">&#10003;</div>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <span class="${pClass}">${pLabel}</span>
        <div class="task-actions">
          <button class="btn-icon btn-edit" title="Edit">✏️</button>
          <button class="btn-icon btn-delete" title="Delete">🗑️</button>
        </div>
      `;

      // Wire up events
      li.querySelector('.task-check').addEventListener('click', () => toggleTask(task.id));
      li.querySelector('.task-text').addEventListener('dblclick', () => enableEdit(task.id));
      li.querySelector('.btn-edit').addEventListener('click', () => enableEdit(task.id));
      li.querySelector('.btn-delete').addEventListener('click', () => deleteTask(task.id));

      taskList.appendChild(li);
    });
  }

  /* ───────────────────────────────────────────
     HELPERS
  ─────────────────────────────────────────── */
  // Prevent XSS when displaying user-entered text
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  /* ───────────────────────────────────────────
     EVENT LISTENERS
  ─────────────────────────────────────────── */
  // Add on button click
  addBtn.addEventListener('click', addTask);

  // Add on Enter key in input
  taskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Filter tab buttons
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Clear completed tasks
  clearBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    render();
  });

  /* ───────────────────────────────────────────
     INIT — Load from localStorage on page load
  ─────────────────────────────────────────── */
  loadTasks();
  render();
</script>

</body>
</html>
